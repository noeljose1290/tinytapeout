project:
  title:        "UART Transmitter (8N1)"
  author:       "Noel Jose"
  discord:      "noeljose1290"
  description:  "8N1 UART transmitter at 115200 baud using 10 MHz clock. Send a byte via ui_in and trigger transmission using uio_in[0]. Output can be read on a USB-serial adapter."
  language:     "Verilog"
  clock_hz:     10000000   # IMPORTANT: must match your design

  tiles: "1x1"
  top_module:  "tt_um_uart_tx"

  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Data bit 0 (LSB)"
  ui[1]: "Data bit 1"
  ui[2]: "Data bit 2"
  ui[3]: "Data bit 3"
  ui[4]: "Data bit 4"
  ui[5]: "Data bit 5"
  ui[6]: "Data bit 6"
  ui[7]: "Data bit 7 (MSB)"

  # Outputs
  uo[0]: "TX (UART transmit line)"
  uo[1]: "Busy (1 = transmitting)"
  uo[2]: "Done (pulse when transmission completes)"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "Send trigger (rising edge starts transmission)"
  uio[1]: "Unused (tie low)"
  uio[2]: "Last byte bit 0 (debug output)"
  uio[3]: "Last byte bit 1"
  uio[4]: "Last byte bit 2"
  uio[5]: "Last byte bit 3"
  uio[6]: "Last byte bit 4"
  uio[7]: "Last byte bit 5"

yaml_version: 6
